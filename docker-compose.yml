version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: adnet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: adnet_db
    ports:
      - '5432:5432'
    volumes:
      - adnet_pgdata:/var/lib/postgresql/data

volumes:
  adnet_pgdata:
